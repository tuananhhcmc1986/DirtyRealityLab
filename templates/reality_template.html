<head>

<style>

.hero{
margin-top:40px;
margin-bottom:40px;
}

.paper-id{
font-size:14px;
color:#777;
letter-spacing:1px;
}

.paper-title{
font-size:34px;
margin:10px 0;
line-height:1.3;
}

.paper-subtitle{
font-size:18px;
color:#666;
margin-bottom:25px;
}

.paper-actions{
margin-top:20px;
}

.paper-actions a{
display:inline-block;
padding:10px 18px;
border:1px solid #000;
text-decoration:none;
margin-right:10px;
}

.paper-actions a:hover{
background:#000;
color:#fff;
}

.summary{
margin-top:50px;
}

.summary h1{
font-size:26px;
margin-top:40px;
}

.summary h2{
font-size:22px;
margin-top:35px;
}

.summary p{
margin:14px 0;
}

.summary table{
border-collapse:collapse;
margin:20px 0;
width:100%;
}

.summary th,
.summary td{
border:1px solid #ddd;
padding:8px;
}

</style>

</head>

<body>

<div id="themeToggle" class="theme-toggle">theme</div>

<div class="container">

<a href="/">← Dirty Reality Lab</a>

<div class="hero">

<div class="paper-id">
Reality #{{ID}}
</div>

<div class="paper-title">
{{TITLE}}
</div>

<div class="paper-subtitle">
Independent research on technology and organizational power
</div>

<div class="paper-actions">

<a href="whitepaper.pdf" download>
Download PDF
</a>

<a href="/">
Back to Index
</a>

</div>

</div>

<hr>

<div class="summary">

{{SUMMARY}}

</div>

<hr>

<div class="subscribe-wrapper">
<div class="subscribe-label">Get new research delivered to your inbox.</div>
<form class="subscribe-form" onsubmit="handleSubscribe(event)">
    <input type="email" class="subscribe-input" placeholder="email@example.com" required>
    <button type="submit" class="subscribe-btn">Subscribe</button>
</form>
<div class="subscribe-msg"></div>
</div>

<hr>

<div class="footer">

<p>
DirtyRealityLab © 2026
</p>

<div class="dmca-badge">
<a href="//www.dmca.com/Protection/Status.aspx?ID=6bc34bde-a24b-47a4-ad74-445a2b5632be">
<img loading="lazy" src="https://images.dmca.com/Badges/dmca_protected_sml_120n.png?ID=6bc34bde-a24b-47a4-ad74-445a2b5632be">
</a>
</div>

</div>

</div>

<script src="../../assets/js/theme.js"></script>
<script>
function handleSubscribe(e) {
  e.preventDefault();
  var form = e.target;
  var email = form.querySelector('input').value;
  var msg = form.parentElement.querySelector('.subscribe-msg');
  var btn = form.querySelector('button');
  btn.disabled = true;
  btn.textContent = '...';
  var url = 'https://script.google.com/macros/s/AKfycbxMbWXIe56bCpGt3oywPv_6NU8FH-UkMgkHbut3fxvneMF905yT4fKP9JLSlygbofNIhA/exec?email=' + encodeURIComponent(email) + '&source=lab.dirtyreality.net';
  fetch(url, { mode: 'no-cors' })
    .then(function() {
      form.style.display = 'none';
      msg.textContent = 'Subscribed! Thank you.';
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = 'Subscribe';
      msg.textContent = 'Something went wrong. Please try again.';
    });
}
</script>

</body>
</html>
